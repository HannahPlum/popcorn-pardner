<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search — Popcorn Pardner</title>
  <link rel="stylesheet" href="style.css" />
  <script src="theme.js"></script>
</head>

<body>

  <!-- ===== HEADER / NAV ===== -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">Popcorn Pardner</a>
      <nav>
        <a href="search.html" class="nav-active">Search</a>
        <a href="reviews.html">Reviews</a>
        <a href="watchlist.html">Watchlist</a>
        <button id="theme-toggle" class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Switch to light mode">☀ Light</button>
      </nav>
    </div>
  </header>

  <!-- ===== SEARCH ===== -->
  <section class="search-page">
    <div class="container">
      <h1 class="page-title">Search Movies</h1>

      <form class="search-form" id="search-form">
        <label for="search-input" class="visually-hidden">Search for a movie</label>
        <input
          type="text"
          class="search-input"
          id="search-input"
          placeholder="Search for a movie..."
          autocomplete="off"
        />
        <button type="submit" class="btn btn-primary">Search</button>
      </form>

      <div id="search-results"></div>
    </div>
  </section>

  <!-- ===== REVIEW MODAL ===== -->
  <div class="modal-overlay" id="review-modal" hidden role="dialog" aria-modal="true" aria-labelledby="modal-movie-title">
    <div class="modal">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>

      <div class="modal-movie">
        <div class="modal-poster" id="modal-poster-wrap">
          <img id="modal-poster-img" src="" alt="" hidden />
          <div class="poster-placeholder" id="modal-poster-placeholder" hidden>No Image</div>
        </div>
        <div class="modal-movie-info">
          <h2 class="modal-movie-title" id="modal-movie-title"></h2>
          <p class="modal-movie-overview" id="modal-movie-overview"></p>
          <div class="omdb-info" id="modal-omdb-info"></div>
          <div id="modal-streaming-info"></div>
        </div>
      </div>

      <button type="button" class="btn btn-primary modal-review-trigger" id="modal-review-btn">Log a Review</button>

      <div class="modal-form" id="review-modal-form" hidden>
        <div class="form-group">
          <p class="form-label">Your Rating</p>
          <div class="hat-rating" id="hat-rating" role="group" aria-label="Rating out of 5 hats">
            <button type="button" class="hat-btn" data-value="1" aria-label="1 hat">🤠</button>
            <button type="button" class="hat-btn" data-value="2" aria-label="2 hats">🤠</button>
            <button type="button" class="hat-btn" data-value="3" aria-label="3 hats">🤠</button>
            <button type="button" class="hat-btn" data-value="4" aria-label="4 hats">🤠</button>
            <button type="button" class="hat-btn" data-value="5" aria-label="5 hats">🤠</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="review-text">Your Review</label>
          <textarea
            class="review-textarea"
            id="review-text"
            placeholder="What did you think of this film, pardner?"
            rows="4"
          ></textarea>
        </div>

        <p class="form-error" id="form-error" hidden></p>

        <div class="modal-actions-right">
          <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
          <button class="btn btn-primary" id="modal-save">Log Movie</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <span>Popcorn Pardner &mdash; A movie review app</span>
    </div>
  </footer>

  <script src="storage.js"></script>
  <script src="omdb.js"></script>
  <script src="search.js"></script>
</body>

</html>
